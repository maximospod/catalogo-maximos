<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maximos Pods - Catálogo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; }
    .card { transition: all 0.3s; }
    .card:hover { transform: translateY(-8px); box-shadow: 0 15px 25px rgba(0,0,0,0.3); }
    .product-img { height: 280px !important; object-fit: cover !important; border-radius: 16px; }
  </style>
</head>
<body class="bg-zinc-950 text-white">

  <div class="max-w-6xl mx-auto p-6">

    <!-- Logo + Banner (agora menor no computador) -->
    <div class="flex flex-col lg:flex-row items-center justify-between gap-6 mb-10">
      <div class="flex items-center gap-4">
        <img src="logo.jfif" alt="Logo" class="w-24 h-24 rounded-2xl object-cover border-4 border-red-500">
        <div>
          <h1 class="text-4xl font-bold text-red-500">MAXIMOS PODS</h1>
          <p class="text-zinc-400 text-lg">Elfbar & Ignite</p>
        </div>
      </div>
      <img src="banner.jfif" alt="Banner" class="w-full lg:w-1/2 rounded-2xl shadow-xl">
    </div>

    <h2 class="text-3xl font-semibold text-center mb-10">Produtos em Promoção</h2>

    <!-- ELF BAR -->
    <h3 class="text-xl font-bold text-red-400 mb-6">Elfbar Ice King 40K</h3>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16">
      <!-- Seus 3 Elfbar permanecem aqui -->
    </div>

    <!-- IGNITE -->
    <h3 class="text-xl font-bold text-orange-400 mb-6">Ignite</h3>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <!-- Seus 6 Ignite permanecem aqui -->
    </div>

    <div class="text-center mt-16 text-zinc-500">
      Maximos Pods © 2026 • Entrega rápida na Grande Florianópolis<br>
      <strong>WhatsApp: (48) 99818-9031</strong>
    </div>
  </div>
</body>
</html>
