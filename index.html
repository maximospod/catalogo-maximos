<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maximos Pods - Catálogo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; }
    .card { transition: all 0.3s; }
    .card:hover { transform: translateY(-8px); box-shadow: 0 15px 25px rgba(0,0,0,0.3); }
    .product-img { height: 280px !important; object-fit: cover !important; border-radius: 16px; }
  </style>
</head>
<body class="bg-zinc-950 text-white">

  <div class="max-w-6xl mx-auto p-6">

    <!-- Logo + Banner -->
    <div class="flex flex-col lg:flex-row items-center justify-between gap-6 mb-10">
      <div class="flex items-center gap-4">
        <img src="logo.jfif" alt="Logo" class="w-24 h-24 rounded-2xl object-cover border-4 border-red-500">
        <div>
          <h1 class="text-4xl font-bold text-red-500">MAXIMOS PODS</h1>
          <p class="text-zinc-400 text-lg">Elfbar & Ignite</p>
        </div>
      </div>
      <img src="banner.jfif" alt="Banner" class="w-full lg:w-2/3 rounded-2xl shadow-xl">
    </div>

    <h2 class="text-3xl font-semibold text-center mb-10">Produtos em Promoção</h2>

    <!-- ELF BAR (mantido) -->
    <h3 class="text-xl font-bold text-red-400 mb-6">Elfbar Ice King 40K</h3>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16">
      <!-- Seus 3 Elfbar permanecem iguais aqui -->
    </div>

    <!-- IGNITE -->
    <h3 class="text-xl font-bold text-orange-400 mb-6">Ignite</h3>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

      <!-- Strawberry Banana V155 -->
      <div class="card bg-zinc-900 rounded-3xl overflow-hidden">
        <img src="https://raw.githubusercontent.com/maximospod/catalogo-maximos/main/pods%20imagens/v155_strawberrybananaice.png" class="product-img" alt="Strawberry Banana">
        <div class="p-6">
          <h2 class="text-2xl font-bold">Strawberry Banana V155</h2>
          <div class="mt-4">
            <span class="line-through text-zinc-500">R$ 130,00</span>
            <p class="text-4xl font-bold text-green-400">R$ 102,00</p>
          </div>
          <a href="https://wa.me/5548998189031?text=Quero%20o%20Ignite%20Strawberry%20Banana%20V155" target="_blank" class="block text-center mt-8 bg-green-600 hover:bg-green-500 py-4 rounded-2xl font-semibold">
            Pedir no WhatsApp
          </a>
        </div>
      </div>

      <!-- Blueberry Ice V155 -->
      <div class="card bg-zinc-900 rounded-3xl overflow-hidden">
        <img src="https://raw.githubusercontent.com/maximospod/catalogo-maximos/main/pods%20imagens/v155_blueberry.png" class="product-img" alt="Blueberry Ice">
        <div class="p-6">
          <h2 class="text-2xl font-bold">Blueberry Ice V155</h2>
          <div class="mt-4">
            <span class="line-through text-zinc-500">R$ 130,00</span>
            <p class="text-4xl font-bold text-green-400">R$ 102,00</p>
          </div>
          <a href="https://wa.me/5548998189031?text=Quero%20o%20Ignite%20Blueberry%20Ice%20V155" target="_blank" class="block text-center mt-8 bg-green-600 hover:bg-green-500 py-4 rounded-2xl font-semibold">
            Pedir no WhatsApp
          </a>
        </div>
      </div>

      <!-- Pineapple Ice V155 -->
      <div class="card bg-zinc-900 rounded-3xl overflow-hidden">
        <img src="https://raw.githubusercontent.com/maximospod/catalogo-maximos/main/pods%20imagens/v155_pineappleice.png" class="product-img" alt="Pineapple Ice">
        <div class="p-6">
          <h2 class="text-2xl font-bold">Pineapple Ice V155</h2>
          <div class="mt-4">
            <span class="line-through text-zinc-500">R$ 130,00</span>
            <p class="text-4xl font-bold text-green-400">R$ 102,00</p>
          </div>
          <a href="https://wa.me/5548998189031?text=Quero%20o%20Ignite%20Pineapple%20Ice%20V155" target="_blank" class="block text-center mt-8 bg-green-600 hover:bg-green-500 py-4 rounded-2xl font-semibold">
            Pedir no WhatsApp
          </a>
        </div>
      </div>

      <!-- Os outros 3 (Tropical, Strawberry Kiwi e Passion Fruit) permanecem -->
    </div>

  </div>
</body>
</html>
